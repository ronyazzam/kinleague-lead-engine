name: Kinleague Lead Engine — 24/7

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  scrape-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create data directory
        run: mkdir -p data

      - name: Restore leads cache
        uses: actions/cache@v4
        with:
          path: |
            data/leads.json
            data/pushed.json
            data/state.json
          key: leads-data-${{ github.run_number }}
          restore-keys: leads-data-

      - name: Run lead engine
        run: node scraper/engine.js
        env:
          NODE_ENV: production

      - name: Print summary
        run: |
          echo "## Lead Engine Results" >> $GITHUB_STEP_SUMMARY
          if [ -f data/state.json ]; then
            node -e "
              const s = require('./data/state.json');
              const rows = [
                ['Total leads', s.totalLeads],
                ['New this run', s.newThisRun],
                ['Hot', s.hotLeads],
                ['Hirers', s.hirers],
                ['Talent', s.talent],
                ['UAE', s.uae],
                ['USA', s.usa],
                ['Lebanon', s.lebanon],
                ['With email', s.withEmail],
                ['Pushed to CRM', s.pushedThisRun],
                ['Duration', (s.durationMs/1000).toFixed(1)+'s'],
              ];
              console.log('| Metric | Value |');
              console.log('|--------|-------|');
              rows.forEach(([k,v]) => console.log('| '+k+' | '+v+' |'));
            " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Save artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: leads-${{ github.run_number }}
          path: data/
          retention-days: 3

      - name: Commit leads back to repo
        if: always()
        run: |
          git config user.email "engine@kinleague.com"
          git config user.name "Kinleague Lead Engine"
          git add data/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "bot: leads $(date -u '+%H:%M %d/%m') — $(node -e "try{const s=require('./data/state.json');process.stdout.write(s.newThisRun+' new, '+s.hotLeads+' hot')}catch{}" 2>/dev/null)"
          git push || echo "Nothing to push"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
