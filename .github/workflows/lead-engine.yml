name: Kinleague Lead Engine — Every Minute

on:
  schedule:
    - cron: '*/5 * * * *'   # GitHub minimum is 5 min; we loop inside for 1-min cadence
  workflow_dispatch:

jobs:
  scrape-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 8        # tight timeout so next 5-min trigger doesn't overlap

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create data directory
        run: mkdir -p data

      - name: Restore leads cache
        uses: actions/cache@v4
        with:
          path: |
            data/leads.json
            data/pushed.json
            data/state.json
          key: leads-data-${{ github.run_number }}
          restore-keys: leads-data-

      # ── LOOP: run engine 5x with 60s gap = 1 scrape per minute ───────────────
      - name: Run 1/5
        run: node scraper/engine.js
        env:
          NODE_ENV: production

      - name: Wait 60s
        run: sleep 60

      - name: Run 2/5
        run: node scraper/engine.js
        env:
          NODE_ENV: production

      - name: Wait 60s
        run: sleep 60

      - name: Run 3/5
        run: node scraper/engine.js
        env:
          NODE_ENV: production

      - name: Wait 60s
        run: sleep 60

      - name: Run 4/5
        run: node scraper/engine.js
        env:
          NODE_ENV: production

      - name: Wait 60s
        run: sleep 60

      - name: Run 5/5
        run: node scraper/engine.js
        env:
          NODE_ENV: production

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Step summary
        if: always()
        run: |
          echo "## Lead Engine $(date -u '+%H:%M UTC %d %b')" >> $GITHUB_STEP_SUMMARY
          if [ -f data/state.json ]; then
            node -e "
              const s = require('./data/state.json');
              console.log('| Metric | Value |');
              console.log('|--------|-------|');
              [
                ['Total leads', s.totalLeads],
                ['New this run', s.newThisRun],
                ['Hot', s.hotLeads],
                ['With phone', s.withPhone],
                ['With email', s.withEmail],
                ['Hirers', s.hirers],
                ['Talent', s.talent],
                ['UAE', s.uae],
                ['USA', s.usa],
                ['Lebanon', s.lebanon],
                ['Pushed to CRM', s.pushedThisRun],
                ['Duration', (s.durationMs/1000).toFixed(1)+'s'],
              ].forEach(function(r){console.log('| '+r[0]+' | '+r[1]+' |')});
            " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Save artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: leads-${{ github.run_number }}
          path: data/
          retention-days: 2

      - name: Commit leads to repo
        if: always()
        run: |
          git config user.email "engine@kinleague.com"
          git config user.name "Kinleague Lead Engine"
          git add data/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "bot: $(date -u '+%H:%M %d/%m') $(node -e "try{const s=require('./data/state.json');process.stdout.write(s.newThisRun+' new, '+s.hotLeads+' hot, '+s.withPhone+' phones')}catch{}" 2>/dev/null)"
          git push || echo "Nothing to push"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
