name: Kinleague Lead Engine 24/7

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: data/
          key: leads-${{ github.run_number }}
          restore-keys: leads-

      - name: Run engine
        run: node scraper/engine.js
        timeout-minutes: 3

      - name: Summary
        if: always()
        run: |
          node -e "
            try {
              const s = require('./data/state.json');
              console.log('Total:', s.totalLeads, '| New:', s.newThisRun, '| Hot:', s.hotLeads);
              console.log('Phone:', s.withPhone, '| Email:', s.withEmail, '| Pushed:', s.pushedThisRun);
              console.log('Hirers:', s.hirers, '| Talent:', s.talent, '| Guarantee:', s.minLeadsGuarantee);
            } catch(e) { console.log('No state yet'); }
          "

      - name: Commit data
        if: always()
        run: |
          git config user.email "bot@kinleague.com"
          git config user.name "Lead Engine Bot"
          git add data/
          git diff --staged --quiet || git commit -m "leads: $(date -u '+%H:%M') — $(node -e "try{const s=require('./data/state.json');process.stdout.write(s.totalLeads+' total, '+s.newThisRun+' new, '+s.withPhone+' phones')}catch{}" 2>/dev/null)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
