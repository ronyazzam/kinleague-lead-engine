name: Kinleague Lead Engine

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - uses: actions/cache@v4
        with:
          path: data/
          key: kinleague-leads-${{ github.run_number }}
          restore-keys: kinleague-leads-

      - name: Run engine
        run: node scraper/engine.js
        timeout-minutes: 3

      - name: Summary
        if: always()
        run: |
          node -e "
            try {
              const s = require('./data/state.json');
              console.log('Total:', s.total, '| New:', s.newThisRun);
              console.log('Hot:', s.hot, '| Warm:', s.warm, '| WithPhone:', s.withPhone);
              console.log('Hirers:', s.hirers, '| Talent:', s.talent);
            } catch(e) { console.log('No state yet'); }
          "

      - name: Commit data
        if: always()
        run: |
          git config user.email "bot@kinleague.com"
          git config user.name "Lead Bot"
          git add data/
          git diff --staged --quiet || git commit -m "leads: $(date -u '+%H:%M') $(node -e "try{const s=require('./data/state.json');process.stdout.write(s.total+' total, '+s.withPhone+' phones, '+s.newThisRun+' new')}catch{}" 2>/dev/null)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
