name: Kinleague Lead Scraper

on:
  schedule:
    # Every 2 hours (stays within GitHub free tier: 12 runs/day × ~5min = ~1,800 min/month)
    - cron: '0 */2 * * *'
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lead scraper
        run: node scraper/index.js
        env:
          NODE_ENV: production

      - name: Show results
        run: |
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('./leads.json')) { console.log('No leads.json'); process.exit(0); }
            const leads = JSON.parse(fs.readFileSync('./leads.json'));
            const hot = leads.filter(l => l.heat === 'Hot');
            const withEmail = leads.filter(l => l.contactEmail);
            console.log('Total:', leads.length);
            console.log('Hot:', hot.length);
            console.log('With email:', withEmail.length);
            // Write GitHub step summary
            if (process.env.GITHUB_STEP_SUMMARY) {
              const summary = hot.slice(0, 8).map(l =>
                '- **' + l.company + '** — ' + l.title + ' (' + l.location + ')' + (l.contactEmail ? ' 📧 ' + l.contactEmail : '')
              ).join('\n');
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,
                '## 🔥 ' + hot.length + ' Hot Leads Found\n' + summary + '\n\n**Total:** ' + leads.length + ' | **With email:** ' + withEmail.length + '\n'
              );
            }
          "

      - name: Auto-push hot leads with email to Kinleague CRM
        run: |
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('./leads.json')) process.exit(0);
            const leads = JSON.parse(fs.readFileSync('./leads.json'));
            const pushed = fs.existsSync('./pushed.json') ? JSON.parse(fs.readFileSync('./pushed.json')) : [];
            const pushedSet = new Set(pushed);

            const SUPABASE_URL = 'https://babhsufcvybimxysgvwb.supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhYmhzdWZjdnliaW14eXNndndiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1OTk0MTgsImV4cCI6MjA5NjE3NTQxOH0.CgOQgPhLYD_FnTgF9Sm2NGETDll9dQT8gWCkFtpcsHc';

            // Push hot leads with email that haven't been pushed yet
            const toSend = leads.filter(l => l.heat === 'Hot' && l.contactEmail && !pushedSet.has(l.id));
            console.log('New hot leads with email to auto-push:', toSend.length);

            async function pushAll() {
              for (const lead of toSend) {
                try {
                  const payload = {
                    name: lead.company,
                    email: lead.contactEmail || '',
                    enquiry_type: 'hire',
                    role: lead.title,
                    message: '[AUTO-PUSHED by Lead Engine]\nHeat: ' + lead.heat + ' | Score: ' + lead.score + '\nSource: ' + lead.source + '\nLocation: ' + lead.location + '\nPosted: ' + lead.postedAt + '\nLink: ' + (lead.link || '') + '\n\nSuggested outreach:\n' + (lead.message || ''),
                    source: 'lead_engine_auto',
                    created_at: new Date().toISOString()
                  };
                  const res = await fetch(SUPABASE_URL + '/rest/v1/website_leads', {
                    method: 'POST',
                    headers: {
                      'Content-Type': 'application/json',
                      'apikey': SUPABASE_KEY,
                      'Authorization': 'Bearer ' + SUPABASE_KEY,
                      'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(payload)
                  });
                  if (res.ok || res.status === 201) {
                    pushedSet.add(lead.id);
                    console.log('✓ Auto-pushed:', lead.company, '—', lead.title);
                  } else {
                    console.log('✗ Failed:', lead.company, res.status);
                  }
                } catch (err) {
                  console.error('Push error:', lead.company, err.message);
                }
                await new Promise(r => setTimeout(r, 400));
              }
              fs.writeFileSync('./pushed.json', JSON.stringify([...pushedSet], null, 2));
              console.log('Done. Total pushed ever:', pushedSet.size);
            }
            pushAll();
          "

      - name: Upload leads as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: leads-${{ github.run_number }}
          path: |
            leads.json
            leads.csv
          retention-days: 7

      - name: Commit updated leads back to repo
        run: |
          git config --local user.email "leadengine@kinleague.com"
          git config --local user.name "Kinleague Lead Engine Bot"
          git add leads.json leads.csv pushed.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "auto: leads update $(date -u '+%Y-%m-%d %H:%M') UTC — $(node -e "const l=require('./leads.json'); console.log(l.length + ' leads, ' + l.filter(x=>x.heat==='Hot').length + ' hot')")"
          git push origin main || echo "Push skipped"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
